const SCALE_LABELS=["","Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];
const SCALE_COLS=["","#B02020","#C86020","#A87018","#1A7A42","#1B2F72"];
const av=(arr)=>{const v=arr.filter(x=>typeof x==="number");return v.length?v.reduce((a,b)=>a+b)/v.length:null;};
const sCol=(s)=>s>=4.5?B.navy:s>=4?B.success:s>=3?B.warn:B.danger;
const sLbl=(s)=>s>=4.5?"Excellent":s>=4?"Good":s>=3?"Fair":"Needs Attention";
const fmt=(n)=>n?n.toFixed(1):"—";

function SBWheel({size=44}){
  const cx=size/2,cy=size/2,r2=size*.47,r1=r2*.36,gap=2.5;
  const seg=(i)=>{
    const s1=-90+i*36+gap/2,s2=-90+(i+1)*36-gap/2,ra=d=>d*Math.PI/180;
    const pt=(r,a)=>[cx+r*Math.cos(ra(a)),cy+r*Math.sin(ra(a))];
    const [x1,y1]=pt(r1,s1),[x2,y2]=pt(r2,s1),[x3,y3]=pt(r2,s2),[x4,y4]=pt(r1,s2),f=v=>v.toFixed(2);
    return `M${f(x1)} ${f(y1)} L${f(x2)} ${f(y2)} A${f(r2)} ${f(r2)} 0 0 1 ${f(x3)} ${f(y3)} L${f(x4)} ${f(y4)} A${f(r1)} ${f(r1)} 0 0 0 ${f(x1)} ${f(y1)}Z`;
  };
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>{WHL.map((c,i)=><path key={i} d={seg(i)} fill={c}/>)}</svg>;
}
function SBLogo({size=44,ts=15}){
  return <div style={{display:"flex",alignItems:"center",gap:12}}><SBWheel size={size}/><div><div style={{fontSize:ts,fontWeight:700,color:B.navy,letterSpacing:"1.5px",textTransform:"uppercase",lineHeight:1.1}}>Sustainable</div><div style={{fontSize:ts,fontWeight:700,color:B.navy,letterSpacing:"1.5px",textTransform:"uppercase",lineHeight:1.1}}>Boards</div></div></div>;
}
function DemoBadge(){return <div style={{position:"fixed",top:16,right:16,zIndex:999,padding:"6px 14px",borderRadius:999,background:B.navy,color:B.gold,fontSize:10,fontWeight:700,letterSpacing:"1.5px",boxShadow:"0 4px 16px rgba(27,47,114,.3)"}}>● DEMO</div>;}

function ScoreRing({score,size=96,color}){
  const r=size*.42,circ=2*Math.PI*r,pct=score?score/5:0,col=color||(score?sCol(score):B.border);
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={B.navyXl} strokeWidth={size*.08}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={size*.08} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:size*.3,fontWeight:600,color:col,lineHeight:1}}>{score?score.toFixed(1):"—"}</div>
        <div style={{fontSize:size*.12,color:B.light}}>/ 5.0</div>
      </div>
    </div>
  );
}

function BarRow({label,score,color}){
  const [w,setW]=useState(0);
  useEffect(()=>{if(score)setTimeout(()=>setW(score/5*100),200);},[score]);
  return(
    <div style={{marginBottom:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/><span style={{fontSize:13}}>{label}</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {score&&<span style={{fontSize:10,color:sCol(score),fontWeight:600}}>{sLbl(score).toUpperCase()}</span>}
          <span style={{fontSize:14,fontWeight:600,color:score?sCol(score):B.light,minWidth:28,textAlign:"right"}}>{fmt(score)}</span>
        </div>
      </div>
      <div style={{height:7,background:B.navyXl,borderRadius:6,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${w}%`,background:color,borderRadius:6,transition:"width 1.3s cubic-bezier(.4,0,.2,1)"}}/>
      </div>
    </div>
  );
}

function LiveDot(){return <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:"#22C55E",animation:"pulse 1.8s ease-in-out infinite"}}/><span style={{fontSize:11,color:"#22C55E",fontWeight:600,letterSpacing:"1px"}}>LIVE</span></span>;}

function Pill({options,value,onChange}){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {options.map(opt=>{
        const id=typeof opt==="string"?opt:opt.id,label=typeof opt==="string"?opt:opt.label,icon=typeof opt==="object"?opt.icon:null,sel=value===id;
        return <button key={id} onClick={()=>onChange(sel?"":id)} style={{padding:"8px 14px",borderRadius:999,border:`1.5px solid ${sel?B.navy:B.border}`,background:sel?B.navyLt:B.navyXl,color:sel?B.navy:B.muted,fontSize:13,fontWeight:sel?600:400,transition:"all .15s",display:"flex",alignItems:"center",gap:5}}>{icon&&<span style={{fontSize:13}}>{icon}</span>}{label}</button>;
      })}
    </div>
  );
}

function MetaChip({icon,label,value}){
  if(!value)return null;
  return <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",background:B.navyXl,borderRadius:8,border:`1px solid ${B.border}`}}><span style={{fontSize:13}}>{icon}</span><span style={{fontSize:10,color:B.light,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px"}}>{label}</span><span style={{fontSize:13,fontWeight:600,color:B.navy}}>{value}</span></div>;
}

function QRDisplay({url,size=152}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    const tryGen=()=>{
      if(window.QRCode){
        try{new window.QRCode(ref.current,{text:url||"https://pulse.sustainable-boards.com",width:size,height:size,colorDark:B.navy,colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.H});}
        catch(e){}
      } else {setTimeout(tryGen,300);}
    };
    tryGen();
  },[url,size]);
  return <div ref={ref} style={{lineHeight:0,display:"inline-block"}}/>;
}

let LIVE_SUBS=[...DEMO_SUBS];

function App(){

  const [screen,setScreen]=useState("setup");
  const [vk,setVK]=useState(0);
  const [questions,setQuestions]=useState(BASE_Q.map(q=>({...q})));
  const [bankQ,setBankQ]=useState([]);
  const [qIdx,setQIdx]=useState(0);
  const [answers,setAnswers]=useState({});

  const [accessRole,setAccessRole]=useState(null);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [copied,setCopied]=useState(false);
  const [dashTab,setDashTab]=useState("results");
  const [trendId,setTrendId]=useState("A");
  const [editIdx,setEditIdx]=useState(null);

  const go=(s)=>{setVK(k=>k+1);setScreen(s);};
  const mtDef=MEETING_TYPES.find(m=>m.id===mtId)||MEETING_TYPES[0];
  const mtName=mtId==="custom"?(customType||"Committee Meeting"):mtDef.label;
  const toolName=`${mtName} Pulse`;
  const mtTitle=clientName?`${clientName} — ${mtName}`:mtName;
  const dateFmt=meetingDate?new Date(meetingDate).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}):"";
  const role=accessRole?ROLES[accessRole]:null;
  const activeQ=questions.filter(q=>q.active!==false);
  const q=activeQ[qIdx]||{};
  const cur=answers[q.id];
  const ratingQs=questions.filter(q=>q.type==="rating"&&q.active!==false);
  const dimAvgs=ratingQs.map(q=>av(LIVE_SUBS.map(s=>s[q.id])));
  const overall=av(dimAvgs.filter(Boolean));
  const texts9=LIVE_SUBS.map(s=>s[9]).filter(Boolean);
  const texts10=LIVE_SUBS.map(s=>s[10]).filter(Boolean);
  const tc=TREND_CLIENTS.find(c=>c.id===trendId)||TREND_CLIENTS[0];
  const slug=clientName.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")||"your-board";
  const surveyUrl=`https://pulse.sustainable-boards.com/${slug}/${mtId==="custom"?"meeting":mtId}`;
  const fmtObj=FORMATS.find(f=>f.id===format);

  useEffect(()=>{const k=mtId==="custom"?"custom":mtId;setBankQ((BANK[k]||BANK.board).map(q=>({...q})));},[mtId]);

  const handleRating=(val)=>{setAnswers(a=>({...a,[q.id]:val}));setTimeout(()=>{if(qIdx<activeQ.length-1){setVK(k=>k+1);setQIdx(i=>i+1);}},360);};

  const handlePin=(d)=>{
    if(pin.length>=4)return;
    const np=pin+d;setPin(np);
    if(np.length===4){
      if(np===ROLES[accessRole].pin){setTimeout(()=>{go("dashboard");setDashTab("results");},200);}
      else{setShaking(true);setPinErr(true);setTimeout(()=>{setPin("");setPinErr(false);setShaking(false);},800);}
    }
  };

  const submitSurvey=()=>{setSubmitting(true);setTimeout(()=>{LIVE_SUBS.push({...answers,ts:new Date().toISOString()});setSubmitting(false);go("complete");},800);};
  const addFromBank=(bq)=>{setQuestions(qs=>[...qs,{...bq,active:true}]);setBankQ(bqs=>bqs.filter(q=>q.id!==bq.id));};
  const copyLink=()=>{try{navigator.clipboard.writeText(surveyUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}catch(e){}};

  const pageStyle={minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem 1.25rem",background:`linear-gradient(145deg,${B.navyLt} 0%,#F2F4FA 70%)`};

  const btnG={padding:"12px 24px",background:"transparent",color:B.navy,border:`1.5px solid ${B.border}`,borderRadius:10,fontSize:13};

  if(screen==="setup") return(
    <div style={{...pageStyle,background:`linear-gradient(145deg,${B.navyDk} 0%,${B.navy} 100%)`}}>

          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {MEETING_TYPES.map(mt=>{const sel=mtId===mt.id;return(<button key={mt.id} onClick={()=>setMtId(mt.id)} style={{padding:"8px 14px",borderRadius:999,border:`1.5px solid ${sel?B.navy:B.border}`,background:sel?B.navyLt:B.navyXl,color:sel?B.navy:B.muted,fontSize:13,fontWeight:sel?600:400,display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}><span>{mt.icon}</span>{mt.label}</button>);})}

            </div>

            <div style={dcStyle}>
              <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:"1.25rem"}}>Average Scores Across All Meetings</div>
              {ratingQs.map((q,i)=>{const vals=tc.mtgs.map(m=>m.scores[i]).filter(v=>typeof v==="number");return <BarRow key={q.id} label={q.dim} score={vals.length?vals.reduce((a,b)=>a+b)/vals.length:null} color={WHL[i%10]}/>;})}</div>

            <div style={dcStyle}>
              <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:"1.25rem"}}>Recurring Themes — All Meetings</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.25rem"}}>
                <div><div style={{fontSize:11,color:B.navy,fontWeight:700,marginBottom:"0.6rem"}}>Strengths</div>{tc.mtgs.flatMap(m=>m.t7||[]).map((t,i)=><div key={i} style={{padding:"0.6rem .9rem",background:B.navyLt,borderRadius:8,fontSize:12,marginBottom:6,lineHeight:1.6,borderLeft:`2px solid ${B.navy}`}}>{t}</div>)}</div>
                <div><div style={{fontSize:11,color:B.warn,fontWeight:700,marginBottom:"0.6rem"}}>Recurring Improvements</div>{tc.mtgs.flatMap(m=>m.t8||[]).map((t,i)=><div key={i} style={{padding:"0.6rem .9rem",background:B.goldLt,borderRadius:8,fontSize:12,marginBottom:6,lineHeight:1.6,borderLeft:`2px solid ${B.gold}`}}>{t}</div>)}</div>
              </div>
            </div>
          </div>
        )}

        {dashTab==="questions"&&(
          <div className="au">
            <div style={dcStyle}>
              <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>Active Question Set — {toolName}</div>
              <div style={{fontSize:13,color:B.muted,marginBottom:"1.5rem"}}>Toggle on/off · Click any question text to edit · Changes apply from the next meeting.</div>
              {questions.map((q,i)=>(
                <div key={q.id} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"1rem",border:`1px solid ${q.active!==false?B.border:B.borderLt}`,borderRadius:12,marginBottom:10,background:q.active!==false?B.navyXl:"#FAFAFA",opacity:q.active!==false?1:.5,transition:"all .2s"}}>
                  <button onClick={()=>setQuestions(qs=>qs.map((qq,ii)=>ii===i?{...qq,active:qq.active!==false?false:true}:qq))} style={{width:36,height:20,borderRadius:10,background:q.active!==false?role.color:"#DDD",border:"none",position:"relative",flexShrink:0,marginTop:3,transition:"background .2s"}}><div style={{width:14,height:14,borderRadius:"50%",background:B.white,position:"absolute",top:3,left:q.active!==false?19:3,transition:"left .2s"}}/></button>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,letterSpacing:"1.5px",textTransform:"uppercase",color:q.type==="rating"?WHL[i%10]:B.gold,fontWeight:700,marginBottom:5}}>{q.dim}{q.optional?" · Optional":""}</div>
                    {editIdx===i?<textarea autoFocus style={{width:"100%",fontSize:13,border:`1.5px solid ${role.color}`,borderRadius:6,padding:"8px 10px",lineHeight:1.5,resize:"none",outline:"none",minHeight:70}} value={q.text} onChange={e=>setQuestions(qs=>qs.map((qq,ii)=>ii===i?{...qq,text:e.target.value}:qq))} onBlur={()=>setEditIdx(null)}/>:<div style={{fontSize:13,color:B.text,lineHeight:1.6,cursor:"pointer"}} onClick={()=>setEditIdx(i)}>{q.text} <span style={{color:B.light,fontSize:11}}>✎</span></div>}
                  </div>
                  <div style={{fontSize:10,color:B.light,background:B.white,padding:"4px 10px",borderRadius:999,border:`1px solid ${B.border}`,flexShrink:0}}>{q.type==="rating"?"1–5":"Open text"}</div>
                </div>
              ))}
            </div>
            {bankQ.length>0&&(
              <div style={{...dcStyle,background:role.colorLt}}>
                <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:role.color,fontWeight:700,marginBottom:4}}>{mtName} Question Bank</div>
                <div style={{fontSize:13,color:B.muted,marginBottom:"1.25rem"}}>Questions tailored to this committee type from the Sustainable Boards 9-Pillar Framework. Click + to add.</div>
                {bankQ.map((q)=>(<div key={q.id} style={{display:"flex",gap:12,alignItems:"center",padding:".9rem 1rem",border:`1px solid ${B.border}`,borderRadius:10,marginBottom:8,background:B.white}}><div style={{flex:1}}><div style={{fontSize:10,letterSpacing:"1.5px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>{q.dim}</div><div style={{fontSize:13,color:B.muted,lineHeight:1.5}}>{q.text}</div></div><button onClick={()=>addFromBank(q)} style={{width:32,height:32,borderRadius:"50%",background:role.color,color:B.white,border:"none",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button></div>))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>

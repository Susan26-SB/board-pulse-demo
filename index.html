  audit:[{id:11,dim:"Financial Reporting",text:"The committee received sufficient assurance on the integrity of financial reporting.",type:"rating"},{id:12,dim:"External Auditor",text:"The relationship with the external auditor was appropriately independent and constructive.",type:"rating"},{id:13,dim:"Internal Controls",text:"The committee has adequate visibility of the effectiveness of internal controls.",type:"rating"}],
  remco:[{id:11,dim:"Remuneration Framework",text:"The committee has clear sight of whether the remuneration framework is aligned with strategy and values.",type:"rating"},{id:12,dim:"Performance Assessment",text:"The performance assessment process was fair, evidence-based, and rigorous.",type:"rating"},{id:13,dim:"Market Alignment",text:"The committee received adequate market data to inform its remuneration decisions.",type:"rating"}],

  custom:[{id:11,dim:"Stakeholder Focus",text:"The meeting gave appropriate consideration to the interests of key stakeholders.",type:"rating"},{id:12,dim:"Information Quality",text:"The quality and depth of information was appropriate for the decisions required.",type:"rating"}],

const SCALE_LABELS=["","Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];
const SCALE_COLS=["","#B02020","#C86020","#A87018","#1A7A42","#1B2F72"];
const av=(arr)=>{const v=arr.filter(x=>typeof x==="number");return v.length?v.reduce((a,b)=>a+b)/v.length:null;};
const sCol=(s)=>s>=4.5?B.navy:s>=4?B.success:s>=3?B.warn:B.danger;
const sLbl=(s)=>s>=4.5?"Excellent":s>=4?"Good":s>=3?"Fair":"Needs Attention";
const fmt=(n)=>n?n.toFixed(1):"—";

function SBWheel({size=44}){
  const cx=size/2,cy=size/2,r2=size*.47,r1=r2*.36,gap=2.5;
  const seg=(i)=>{
    const s1=-90+i*36+gap/2,s2=-90+(i+1)*36-gap/2,ra=d=>d*Math.PI/180;
    const pt=(r,a)=>[cx+r*Math.cos(ra(a)),cy+r*Math.sin(ra(a))];
    const [x1,y1]=pt(r1,s1),[x2,y2]=pt(r2,s1),[x3,y3]=pt(r2,s2),[x4,y4]=pt(r1,s2),f=v=>v.toFixed(2);
    return `M${f(x1)} ${f(y1)} L${f(x2)} ${f(y2)} A${f(r2)} ${f(r2)} 0 0 1 ${f(x3)} ${f(y3)} L${f(x4)} ${f(y4)} A${f(r1)} ${f(r1)} 0 0 0 ${f(x1)} ${f(y1)}Z`;
  };
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>{WHL.map((c,i)=><path key={i} d={seg(i)} fill={c}/>)}</svg>;
}
function SBLogo({size=44,ts=15}){
  return <div style={{display:"flex",alignItems:"center",gap:12}}><SBWheel size={size}/><div><div style={{fontSize:ts,fontWeight:700,color:B.navy,letterSpacing:"1.5px",textTransform:"uppercase",lineHeight:1.1}}>Sustainable</div><div style={{fontSize:ts,fontWeight:700,color:B.navy,letterSpacing:"1.5px",textTransform:"uppercase",lineHeight:1.1}}>Boards</div></div></div>;
}
function DemoBadge(){return null;}

function ScoreRing({score,size=96,color}){
  const r=size*.42,circ=2*Math.PI*r,pct=score?score/5:0,col=color||(score?sCol(score):B.border);
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={B.navyXl} strokeWidth={size*.08}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={size*.08} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:size*.3,fontWeight:600,color:col,lineHeight:1}}>{score?score.toFixed(1):"—"}</div>
        <div style={{fontSize:size*.12,color:B.light}}>/ 5.0</div>
      </div>
    </div>
  );
}

function BarRow({label,score,color}){
  const [w,setW]=useState(0);
  useEffect(()=>{if(score)setTimeout(()=>setW(score/5*100),200);},[score]);
  return(
    <div style={{marginBottom:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/><span style={{fontSize:13}}>{label}</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {score&&<span style={{fontSize:10,color:sCol(score),fontWeight:600}}>{sLbl(score).toUpperCase()}</span>}
          <span style={{fontSize:14,fontWeight:600,color:score?sCol(score):B.light,minWidth:28,textAlign:"right"}}>{fmt(score)}</span>
        </div>
      </div>
      <div style={{height:7,background:B.navyXl,borderRadius:6,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${w}%`,background:color,borderRadius:6,transition:"width 1.3s cubic-bezier(.4,0,.2,1)"}}/>
      </div>
    </div>
  );
}

function LiveDot(){return <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:"#22C55E",animation:"pulse 1.8s ease-in-out infinite"}}/><span style={{fontSize:11,color:"#22C55E",fontWeight:600,letterSpacing:"1px"}}>LIVE</span></span>;}

function Pill({options,value,onChange}){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {options.map(opt=>{
        const id=typeof opt==="string"?opt:opt.id,label=typeof opt==="string"?opt:opt.label,icon=typeof opt==="object"?opt.icon:null,sel=value===id;
        return <button key={id} onClick={()=>onChange(sel?"":id)} style={{padding:"8px 14px",borderRadius:999,border:`1.5px solid ${sel?B.navy:B.border}`,background:sel?B.navyLt:B.navyXl,color:sel?B.navy:B.muted,fontSize:13,fontWeight:sel?600:400,transition:"all .15s",display:"flex",alignItems:"center",gap:5}}>{icon&&<span style={{fontSize:13}}>{icon}</span>}{label}</button>;
      })}
    </div>
  );
}

function MetaChip({icon,label,value}){
  if(!value)return null;
  return <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",background:B.navyXl,borderRadius:8,border:`1px solid ${B.border}`}}><span style={{fontSize:13}}>{icon}</span><span style={{fontSize:10,color:B.light,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px"}}>{label}</span><span style={{fontSize:13,fontWeight:600,color:B.navy}}>{value}</span></div>;
}

function QRDisplay({url,size=152}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    const tryGen=()=>{
      if(window.QRCode){
        try{new window.QRCode(ref.current,{text:url||"https://pulse.sustainable-boards.com",width:size,height:size,colorDark:B.navy,colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.H});}
        catch(e){}
      } else {setTimeout(tryGen,300);}
    };
    tryGen();
  },[url,size]);
  return <div ref={ref} style={{lineHeight:0,display:"inline-block"}}/>;
}

const SB_URL=window.SUPABASE_URL||"https://xpooueccjznpmwpmbutm.supabase.co";
const SB_KEY=window.SUPABASE_ANON_KEY||"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhwb291ZWNjanpucG13cG1idXRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDI1NDIsImV4cCI6MjA5Njk3ODU0Mn0.WzSdDigrAQycxC5F2rPh6StP4oPpl8JRfisO30-IRB8";
const SLUG=window.PULSE_WORKSPACE_SLUG||"demo";
const SB_READY=/^https:\/\/.+\.supabase\.co/.test(SB_URL)&&SB_KEY.indexOf("eyJ")===0;
const db=(SB_READY&&window.supabase)?window.supabase.createClient(SB_URL,SB_KEY):null;
// If db is null the app runs in offline DEMO mode exactly as before.

function App(){
  const [clientName,setClientName]=useState("");
  const [mtId,setMtId]=useState("board");
  const [customType,setCustomType]=useState("");
  const [meetingDate,setMeetingDate]=useState(new Date().toISOString().slice(0,10));
  const [duration,setDuration]=useState("");
  const [format,setFormat]=useState("");
  const [packSize,setPackSize]=useState("");
  const [screen,setScreen]=useState(()=>(db&&new URLSearchParams(window.location.search).get("m"))?"loading":"welcome");
  const [vk,setVK]=useState(0);
  const [questions,setQuestions]=useState(BASE_Q.map(q=>({...q})));
  const [bankQ,setBankQ]=useState([]);
  const [qIdx,setQIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const [accessRole,setAccessRole]=useState(null);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [copied,setCopied]=useState(false);
  const [dashTab,setDashTab]=useState("results");
  const [trendId,setTrendId]=useState("A");
  const [editIdx,setEditIdx]=useState(null);
  const [subs,setSubs]=useState([]);
  const [workspaceId,setWorkspaceId]=useState(null);
  const [meetingId,setMeetingId]=useState(null);
  const [verifiedPin,setVerifiedPin]=useState("");
  const [currentMeeting,setCurrentMeeting]=useState(null);
  const [showNewMeeting,setShowNewMeeting]=useState(false);
  const [nmTitle,setNmTitle]=useState("");
  const [nmDate,setNmDate]=useState(new Date().toISOString().slice(0,10));
  const [nmDuration,setNmDuration]=useState("");
  const [nmFormat,setNmFormat]=useState("");
  const [nmPack,setNmPack]=useState("");
  const [creating,setCreating]=useState(false);
  const [nmErr,setNmErr]=useState("");
  const [closing,setClosing]=useState(false);
  const [trendMtgs,setTrendMtgs]=useState(null);
  const [savingQ,setSavingQ]=useState(false);
  const [qSaved,setQSaved]=useState(false);

  const go=(s)=>{setVK(k=>k+1);setScreen(s);};
  const mtDef=MEETING_TYPES.find(m=>m.id===mtId)||MEETING_TYPES[0];
  const mtName=mtId==="custom"?(customType||"Committee Meeting"):mtDef.label;
  const toolName=`${mtName} Pulse`;
  const mtTitle=clientName?`${clientName} — ${mtName}`:mtName;
  const dateFmt=meetingDate?new Date(meetingDate).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}):"";
  const role=accessRole?ROLES[accessRole]:null;
  const activeQ=questions.filter(q=>q.active!==false);
  const q=activeQ[qIdx]||{};
  const cur=answers[q.id];
  const ratingQs=questions.filter(q=>q.type==="rating"&&q.active!==false);
  const dimAvgs=ratingQs.map(q=>av(subs.map(s=>s[q.id])));
  const overall=av(dimAvgs.filter(Boolean));
  const texts9=subs.map(s=>s[9]).filter(Boolean);
  const texts10=subs.map(s=>s[10]).filter(Boolean);
  const realTrends=!!db;
  const tc={name:clientName||mtTitle||"This workspace",industry:"",boardSize:0,mtgs:trendMtgs||[]};
  const slug=clientName.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")||"your-board";
  const surveyUrl=`https://pulse.sustainable-boards.com/${slug}/${mtId==="custom"?"meeting":mtId}`;
  // The real, scannable link points THIS app at one specific meeting via ?w=&m=.
  const shareUrl=(workspaceId&&meetingId)?`${window.location.origin}${window.location.pathname}?w=${workspaceId}&m=${meetingId}`:surveyUrl;
  const fmtObj=FORMATS.find(f=>f.id===format);

  useEffect(()=>{const k=mtId==="custom"?"custom":mtId;setBankQ((BANK[k]||BANK.board).map(q=>({...q})));},[mtId]);

  // Bind this deployment to its workspace + current open meeting in Supabase.
  useEffect(()=>{
    if(!db)return;
    (async()=>{
      try{
        const params=new URLSearchParams(window.location.search);
        const mParam=params.get("m");
        if(mParam){
          // Respondent arrived via a QR/link to one specific meeting.
          const {data:mt}=await db.from("meetings").select("id, workspace_id, title, meeting_date, duration, format, pack_size, status").eq("id",mParam).maybeSingle();
          if(mt){
            setWorkspaceId(mt.workspace_id);setMeetingId(mt.id);setCurrentMeeting(mt);
            if(mt.meeting_date)setMeetingDate(mt.meeting_date);
            const {data:wsq}=await db.from("workspaces").select("client_name, meeting_type, questions").eq("id",mt.workspace_id).maybeSingle();if(wsq){applyWorkspace(wsq);if(wsq.questions)applyQuestions(wsq.questions);}
            if(mt.status==="open"){setQIdx(0);setAnswers({});go("welcome");}
            else go("closed");
          }else{
            go("closed");
          }
          return;
        }
        // Default (Chair/CoSec or no params): bind to the latest open meeting for this workspace.
        const {data:ws}=await db.from("workspaces").select("id, client_name, meeting_type, questions").eq("slug",SLUG).maybeSingle();
        if(!ws)return;
        setWorkspaceId(ws.id);
        applyWorkspace(ws);
        if(ws.questions)applyQuestions(ws.questions);
        const {data:mt}=await db.from("meetings").select("id, title, meeting_date, duration, format, pack_size, status").eq("workspace_id",ws.id).eq("status","open").order("created_at",{ascending:false}).limit(1).maybeSingle();
        if(mt){setMeetingId(mt.id);setCurrentMeeting(mt);if(mt.meeting_date)setMeetingDate(mt.meeting_date);}
      }catch(e){console.error("Supabase bootstrap failed",e);}
    })();
  },[]);

  // Read responses for a workspace through the PIN-gated function (Chair/CoSec only).
  const loadResponses=async(wsId,p)=>{
    if(!db)return;
    try{
      const {data,error}=await db.rpc("get_responses",{p_workspace_id:wsId||workspaceId,p_pin:p||verifiedPin});
      if(!error&&Array.isArray(data))setSubs(data.map(r=>r.answers));
    }catch(e){console.error("Load responses failed",e);}
  };

  // Apply a question set saved on the workspace record, keeping the bank free of duplicates.
  const applyQuestions=(arr)=>{
    if(!Array.isArray(arr)||!arr.length)return;
    setQuestions(arr.map(q=>({...q})));
    setBankQ(bqs=>bqs.filter(b=>!arr.some(q=>q.id===b.id)));
  };
  // Pull the client name + meeting type for the welcome/survey screens from the workspace record.
  const applyWorkspace=(ws)=>{
    if(!ws)return;
    const cn=ws.client_name||ws.name;if(cn)setClientName(cn);
    const mt=ws.meeting_type||ws.type;
    if(mt){const f=MEETING_TYPES.find(t=>t.id===mt||t.label===mt);if(f&&f.id!=="custom")setMtId(f.id);else{setMtId("custom");setCustomType(mt);}}
  };
  // Persist the current question set to the workspace record in Supabase (PIN-gated).
  const saveQuestions=async()=>{
    if(!db){setQSaved(true);setTimeout(()=>setQSaved(false),2000);return;}
    setSavingQ(true);
    try{
      const {error}=await db.rpc("save_questions",{p_slug:SLUG,p_pin:verifiedPin,p_questions:questions});
      if(error)throw error;
      setQSaved(true);setTimeout(()=>setQSaved(false),2500);
    }catch(e){console.error("Save questions failed",e);alert("Could not save the question set.\n\n"+(e.message||e));}
    setSavingQ(false);
  };

  // Build the Trend Analysis history for the whole workspace from real meetings + responses.
  const loadTrends=async()=>{
    if(!db||!workspaceId)return;
    try{
      const {data:mtgs}=await db.from("meetings").select("id, title, meeting_date, duration, format, pack_size").eq("workspace_id",workspaceId).order("meeting_date",{ascending:true});
      const {data:resp}=await db.rpc("get_responses",{p_workspace_id:workspaceId,p_pin:verifiedPin});
      const byMtg={};
      (resp||[]).forEach(r=>{(byMtg[r.meeting_id]=byMtg[r.meeting_id]||[]).push(r.answers||{});});
      setTrendMtgs((mtgs||[]).map(m=>{
        const rs=byMtg[m.id]||[];
        return {
          title:m.title,
          date:m.meeting_date?new Date(m.meeting_date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):"",
          n:rs.length,
          scores:ratingQs.map(qq=>av(rs.map(a=>a[qq.id]))),
          duration:m.duration,
          format:(FORMATS.find(f=>f.id===m.format)||{}).label||m.format||"",
          packSize:m.pack_size,
          t7:rs.map(a=>a[9]).filter(Boolean),
          t8:rs.map(a=>a[10]).filter(Boolean),
        };
      }));
    }catch(e){console.error("Load trends failed",e);}
  };

  // Live updates: while a dashboard is open, refresh responses every few seconds.
  useEffect(()=>{
    if(!db||screen!=="dashboard"||!workspaceId||!verifiedPin)return;
    const t=setInterval(()=>loadResponses(workspaceId,verifiedPin),4000);
    return ()=>clearInterval(t);
  },[screen,workspaceId,verifiedPin]);

  // Load real trend history whenever the Trend Analysis tab is opened.

              <div style={{...dcStyle,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>Active Meeting</div>
                  {currentMeeting?(
                    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <span style={{fontSize:16,fontWeight:600,color:B.navy}}>{currentMeeting.title}</span>
                      <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:999,background:currentMeeting.status==="open"?"#EDF7F2":"#FDF0F0",color:currentMeeting.status==="open"?B.success:B.danger,textTransform:"uppercase",letterSpacing:"1px"}}>{currentMeeting.status==="open"?"● Open":"Closed"}</span>
                      {currentMeeting.meeting_date&&<span style={{fontSize:12,color:B.light}}>{new Date(currentMeeting.meeting_date).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</span>}
                    </div>
                  ):<div style={{fontSize:13,color:B.muted}}>No meeting is open yet. Create one to start collecting responses.</div>}
                </div>
                <div style={{display:"flex",gap:10,flexShrink:0}}>
                  {currentMeeting&&currentMeeting.status==="open"&&<button onClick={closeMeeting} disabled={closing} style={{padding:"12px 18px",background:"transparent",color:B.danger,border:`1.5px solid ${B.danger}`,borderRadius:10,fontSize:13,fontWeight:600,opacity:closing?.6:1}}>{closing?"Closing…":"Close Meeting"}</button>}
                  <button onClick={openNewMeeting} style={{padding:"12px 20px",background:role.color,color:B.white,border:"none",borderRadius:10,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,lineHeight:1}}>+</span> New Meeting</button>
                </div>
              </div>
            )}
            {/* QR code + meeting context */}
            <div style={{...dcStyle,display:"grid",gridTemplateColumns:"auto 1fr",gap:"2rem",alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                <div style={{padding:12,background:B.white,border:`2px solid ${role.color}`,borderRadius:16,boxShadow:`0 4px 24px ${role.color}25`}}>
                  <QRDisplay url={shareUrl} size={148}/>
                </div>
                <div style={{fontSize:10,color:B.light,textAlign:"center",lineHeight:1.4}}>Point camera to open survey</div>
              </div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"0.75rem"}}>{currentMeeting&&currentMeeting.status==="closed"?<span style={{fontSize:13,color:B.muted,fontWeight:500}}>Survey closed — showing final results</span>:<><LiveDot/><span style={{fontSize:13,color:B.muted,fontWeight:500}}>Survey open — responses arriving live</span></>}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",color:B.navy,marginBottom:"0.25rem"}}>{toolName}</div>
                {clientName&&<div style={{fontSize:13,color:B.gold,fontWeight:500,marginBottom:"0.2rem"}}>{clientName}</div>}
                {dispDateFmt&&<div style={{fontSize:12,color:B.light,marginBottom:"1rem"}}>{dispDateFmt}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:"1rem"}}>
                  {dispFmtObj&&<MetaChip icon={dispFmtObj.icon} label="Format" value={dispFmtObj.label}/>}
                  {dispDuration&&<MetaChip icon="⏱" label="Duration" value={dispDuration}/>}
                  {dispPack&&<MetaChip icon="📄" label="Pack" value={dispPack}/>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:B.navyXl,borderRadius:8,border:`1px solid ${B.border}`}}>
                  <span style={{fontSize:12,color:B.muted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shareUrl}</span>
                  <button onClick={copyLink} style={{padding:"5px 12px",background:copied?B.success:role.color,color:B.white,border:"none",borderRadius:6,fontSize:11,fontWeight:600,flexShrink:0,transition:"background .2s"}}>{copied?"Copied ✓":"Copy Link"}</button>
                </div>
              </div>
            </div>

            {/* Score ring + stats */}
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:14,marginBottom:"1.25rem"}}>
              <div style={{...dcStyle,marginBottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"1.5rem 1.75rem"}}>
                <ScoreRing score={overall} size={96} color={role.color}/>
                <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600}}>Overall</div>
                {overall&&<span style={{fontSize:10,color:sCol(overall),fontWeight:600}}>{sLbl(overall).toUpperCase()}</span>}
              </div>
              {[
                {l:"Responses",v:subs.length,s:"members responded"},
                {l:"Strongest",v:ratingQs[dimAvgs.indexOf(Math.max(...dimAvgs.filter(Boolean)))]?.dim.split(" ")[0]||"—",s:fmt(Math.max(...dimAvgs.filter(Boolean)))+" / 5.0"},
                {l:"Focus Area",v:ratingQs[dimAvgs.indexOf(Math.min(...dimAvgs.filter(Boolean)))]?.dim.split(" ")[0]||"—",s:fmt(Math.min(...dimAvgs.filter(Boolean)))+" / 5.0"},
              ].map(({l,v,s})=>(<div key={l} style={{...dcStyle,marginBottom:0,padding:"1.25rem 1.5rem"}}><div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:"0.5rem"}}>{l}</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"2rem",color:role.color,lineHeight:1,marginBottom:"0.25rem"}}>{v}</div><div style={{fontSize:11,color:B.muted}}>{s}</div></div>))}
            </div>

            <div style={dcStyle}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}><div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600}}>Score by Dimension</div><div style={{fontSize:11,color:B.muted}}>{dateFmt}</div></div>
              {ratingQs.map((q,i)=><BarRow key={q.id} label={q.dim} score={dimAvgs[i]} color={WHL[i%10]}/>)}
            </div>

            {(texts9.length>0||texts10.length>0)&&(
              <div style={dcStyle}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
                  {texts9.length>0&&<div><div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:B.navy,fontWeight:700,marginBottom:"0.75rem"}}>What Worked Well</div>{texts9.map((t,i)=><div key={i} style={{padding:"0.75rem 1rem",background:B.navyLt,borderRadius:10,fontSize:12,color:B.text,marginBottom:8,lineHeight:1.7,borderLeft:`3px solid ${B.navy}`}}>{t}</div>)}</div>}
                  {texts10.length>0&&<div><div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:B.gold,fontWeight:700,marginBottom:"0.75rem"}}>Improvements Suggested</div>{texts10.map((t,i)=><div key={i} style={{padding:"0.75rem 1rem",background:B.goldLt,borderRadius:10,fontSize:12,color:B.text,marginBottom:8,lineHeight:1.7,borderLeft:`3px solid ${B.gold}`}}>{t}</div>)}</div>}
                </div>
              </div>
            )}
          </div>
        )}

        {dashTab==="trends"&&(
          <div className="au">
            <div style={{display:"flex",gap:10,marginBottom:"1.25rem",flexWrap:"wrap"}}>
              {realTrends?(
                <div style={{padding:"10px 18px",borderRadius:10,border:`1.5px solid ${role.color}`,background:role.colorLt,color:role.color,fontSize:13,fontWeight:600}}>{tc.name} <span style={{fontSize:10,color:B.light,marginLeft:6}}>{tc.mtgs.length} meeting{tc.mtgs.length===1?"":"s"}</span></div>
              ):null}
            </div>

            <div style={dcStyle}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem",flexWrap:"wrap",gap:8}}>
                <div><div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>Overall Score — Meeting Trend</div><div style={{fontSize:13,color:B.muted}}>{tc.name}{tc.boardSize?` · ${tc.boardSize}-member board`:""} · {tc.mtgs.length} meeting{tc.mtgs.length===1?"":"s"} on record</div></div>
                {(()=>{const sc=tc.mtgs.filter(m=>av(m.scores)!=null);if(sc.length<2)return null;const diff=av(sc[sc.length-1].scores)-av(sc[0].scores);return <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:999,background:diff>=0?"#EDF7F2":"#FDF0F0",color:diff>=0?B.success:B.danger,fontSize:12,fontWeight:600}}>{diff>=0?"▲":"▼"} {Math.abs(diff).toFixed(1)} since first meeting</div>;})()}
              </div>
              <div style={{display:"flex",gap:16,alignItems:"flex-start",paddingBottom:8}}>
                {tc.mtgs.map((m,i)=>{
                  const s=av(m.scores),h=s?(s/5)*140:0,col=s?sCol(s):B.border,fObj=FORMATS.find(f=>f.label===m.format);
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                      <div style={{fontSize:13,fontWeight:700,color:col}}>{s?s.toFixed(1):"—"}</div>
                      <div style={{width:"100%",background:B.navyXl,borderRadius:"8px 8px 0 0",height:140,display:"flex",alignItems:"flex-end",overflow:"hidden"}}><div style={{width:"100%",background:col,borderRadius:"8px 8px 0 0",height:`${h}px`,transition:"height 1.4s cubic-bezier(.4,0,.2,1)"}}/></div>
                      <div style={{fontSize:10,color:B.light,textAlign:"center",lineHeight:1.4}}>
                        <div style={{fontWeight:600,color:B.text,fontSize:11}}>{m.title}</div>
                        <div>{m.date}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:3,marginTop:3,flexWrap:"wrap"}}>
                          {fObj&&<span style={{padding:"1px 5px",background:B.navyXl,borderRadius:4,fontSize:9}}>{fObj.icon} {m.format}</span>}
                          {m.duration&&<span style={{padding:"1px 5px",background:B.navyXl,borderRadius:4,fontSize:9}}>⏱{m.duration}</span>}
                        </div>
                        {m.packSize&&<div style={{fontSize:9,color:B.light,marginTop:2}}>📄{m.packSize}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={dcStyle}>
              <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:"1.25rem"}}>Average Scores Across All Meetings</div>
              {ratingQs.map((q,i)=>{const vals=tc.mtgs.map(m=>m.scores[i]).filter(v=>typeof v==="number");return <BarRow key={q.id} label={q.dim} score={vals.length?vals.reduce((a,b)=>a+b)/vals.length:null} color={WHL[i%10]}/>;})}</div>

            <div style={dcStyle}>
              <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:"1.25rem"}}>Recurring Themes — All Meetings</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.25rem"}}>
                <div><div style={{fontSize:11,color:B.navy,fontWeight:700,marginBottom:"0.6rem"}}>Strengths</div>{tc.mtgs.flatMap(m=>m.t7||[]).map((t,i)=><div key={i} style={{padding:"0.6rem .9rem",background:B.navyLt,borderRadius:8,fontSize:12,marginBottom:6,lineHeight:1.6,borderLeft:`2px solid ${B.navy}`}}>{t}</div>)}</div>
                <div><div style={{fontSize:11,color:B.warn,fontWeight:700,marginBottom:"0.6rem"}}>Recurring Improvements</div>{tc.mtgs.flatMap(m=>m.t8||[]).map((t,i)=><div key={i} style={{padding:"0.6rem .9rem",background:B.goldLt,borderRadius:8,fontSize:12,marginBottom:6,lineHeight:1.6,borderLeft:`2px solid ${B.gold}`}}>{t}</div>)}</div>
              </div>
            </div>
          </div>
        )}

        {dashTab==="questions"&&(
          <div className="au">
            <div style={dcStyle}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>Active Question Set — {toolName}</div>
                  <div style={{fontSize:13,color:B.muted,marginBottom:"1.5rem"}}>Toggle on/off · Click any question text to edit · Changes apply from the next meeting.</div>
                </div>
                <button onClick={saveQuestions} disabled={savingQ} style={{padding:"10px 18px",background:qSaved?B.success:role.color,color:B.white,border:"none",borderRadius:10,fontSize:13,fontWeight:600,flexShrink:0,opacity:savingQ?.6:1,transition:"background .2s"}}>{savingQ?"Saving…":qSaved?"Saved ✓":"Save Questions"}</button>
              </div>
              {questions.map((q,i)=>(
                <div key={q.id} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"1rem",border:`1px solid ${q.active!==false?B.border:B.borderLt}`,borderRadius:12,marginBottom:10,background:q.active!==false?B.navyXl:"#FAFAFA",opacity:q.active!==false?1:.5,transition:"all .2s"}}>
                  <button onClick={()=>setQuestions(qs=>qs.map((qq,ii)=>ii===i?{...qq,active:qq.active!==false?false:true}:qq))} style={{width:36,height:20,borderRadius:10,background:q.active!==false?role.color:"#DDD",border:"none",position:"relative",flexShrink:0,marginTop:3,transition:"background .2s"}}><div style={{width:14,height:14,borderRadius:"50%",background:B.white,position:"absolute",top:3,left:q.active!==false?19:3,transition:"left .2s"}}/></button>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,letterSpacing:"1.5px",textTransform:"uppercase",color:q.type==="rating"?WHL[i%10]:B.gold,fontWeight:700,marginBottom:5}}>{q.dim}{q.optional?" · Optional":""}</div>
                    {editIdx===i?<textarea autoFocus style={{width:"100%",fontSize:13,border:`1.5px solid ${role.color}`,borderRadius:6,padding:"8px 10px",lineHeight:1.5,resize:"none",outline:"none",minHeight:70}} value={q.text} onChange={e=>setQuestions(qs=>qs.map((qq,ii)=>ii===i?{...qq,text:e.target.value}:qq))} onBlur={()=>setEditIdx(null)}/>:<div style={{fontSize:13,color:B.text,lineHeight:1.6,cursor:"pointer"}} onClick={()=>setEditIdx(i)}>{q.text} <span style={{color:B.light,fontSize:11}}>✎</span></div>}
                  </div>
                  <div style={{fontSize:10,color:B.light,background:B.white,padding:"4px 10px",borderRadius:999,border:`1px solid ${B.border}`,flexShrink:0}}>{q.type==="rating"?"1–5":"Open text"}</div>
                </div>
              ))}
            </div>
            {bankQ.length>0&&(
              <div style={{...dcStyle,background:role.colorLt}}>
                <div style={{fontSize:11,letterSpacing:"2px",textTransform:"uppercase",color:role.color,fontWeight:700,marginBottom:4}}>{mtName} Question Bank</div>
                <div style={{fontSize:13,color:B.muted,marginBottom:"1.25rem"}}>Questions tailored to this committee type from the Sustainable Boards 9-Pillar Framework. Click + to add.</div>
                {bankQ.map((q)=>(<div key={q.id} style={{display:"flex",gap:12,alignItems:"center",padding:".9rem 1rem",border:`1px solid ${B.border}`,borderRadius:10,marginBottom:8,background:B.white}}><div style={{flex:1}}><div style={{fontSize:10,letterSpacing:"1.5px",textTransform:"uppercase",color:B.light,fontWeight:600,marginBottom:4}}>{q.dim}</div><div style={{fontSize:13,color:B.muted,lineHeight:1.5}}>{q.text}</div></div><button onClick={()=>addFromBank(q)} style={{width:32,height:32,borderRadius:"50%",background:role.color,color:B.white,border:"none",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button></div>))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
